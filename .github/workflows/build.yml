name: Build and Test

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean compile -f examples/java_demo/pom.xml

    - name: Run tests
      run: mvn test -f examples/java_demo/pom.xml

    - name: Generate test report
      if: always()
      run: cat examples/java_demo/target/surefire-reports/*.txt || echo "No test reports"
