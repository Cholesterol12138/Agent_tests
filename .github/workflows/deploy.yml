name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build application
      run: mvn clean package -DskipTests

    - name: Run application
      run: timeout 10 java -cp target/classes com.demo.UserService || true

    - name: Check logs for errors
      run: |
        echo "=== 应用日志 ==="
        cat logs/application.log || echo "No logs"
        echo "=== 检查完成 ==="

    - name: Deploy notification
      run: |
        echo "部署到 ${{ inputs.environment }} 完成"
        echo "部署时间: $(date)"
